name: Generar instaladores

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:

  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: desktop-app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop-app/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Construir instalador Windows (.exe)
        run: npm run build:win

      - name: Publicar .exe en la release de GitHub
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: desktop-app/dist/**/*.exe

  build-mac:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: desktop-app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop-app/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Construir instalador Mac (.dmg)
        run: npm run build:mac

      - name: Publicar .dmg en la release de GitHub
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: desktop-app/dist/**/*.dmg
